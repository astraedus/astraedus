name: Generate contribution snake

# Renders the contribution graph as a snake animation and pushes the SVG to the
# `output` branch, which the profile README references via raw.githubusercontent.
on:
  schedule:
    - cron: "0 */12 * * *" # twice daily, keeps the graph fresh
  workflow_dispatch: # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=fbbf24

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
